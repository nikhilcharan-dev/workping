<!doctype html>
<!--
  ============================================================================
  WorkPing Employee Portal — Vite SPA shell
  ============================================================================

  Compiled by `vite build` and served by the reverse proxy at employee.workping.live.

  ── BUILD ──────────────────────────────────────────────────────────────────
  • Vite 5 + React 18; entry is /src/main.jsx (BrowserRouter + <App />)
  • The reverse proxy serves /portal/* from /var/www/workping/employees-ui/dist/
    (see the edge proxy config — "Employee portal SPA" location block)
  • API calls hit api.workping.live (centralized-server/server)

  ── EMPLOYEE PORTAL CAPABILITIES ──────────────────────────────────────────
  • Face check-in/out  — react-webcam captures, posts base64 to
    /api/user/attendance which forwards to face-api-microservice/app.py
    for 1:1 cosine similarity verification (THRESHOLD = 0.6, see app.py)
  • Attendance history heatmap + drilldown
  • Leave requests + multi-level approval status tracking
  • Salary slip download + 2FA setup + profile management
  • Real-time notifications via socket.io-client room `user:<userId>`

  ── ENTRY DETAILS ─────────────────────────────────────────────────────────
  • src/main.jsx — Vite entry, wraps App in BrowserRouter + StrictMode
  • src/App.jsx  — composes the provider tree + route tree

  ── SPLASH SCREEN ─────────────────────────────────────────────────────────
  Lightweight white-background card with the WorkPing logo; removed via
  MutationObserver on #root as soon as React mounts.

  ── DIFFERENCE FROM admin-ui ──────────────────────────────────────────────
  Same Vite + React stack but a separate route tree restricted to employee
  capabilities. Role separation is enforced server-side by middleware/
  requireRole.js + authorizeManager.js in the Core API.
  ============================================================================
-->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkPing | Workforce Management</title>

  <style>
    #splash-screen {
      position: fixed;
      top: 50%;
      left: 50%;
      background: white;
      display: flex;
      height: 100%;
      width: 100%;
      transform: translate(-50%, -50%);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: all 15s linear;
      overflow: hidden;
    }

    #splash-screen.remove {
      animation: fadeout 0.7s forwards;
      z-index: 0;
    }

    @keyframes fadeout {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <div id="splash-screen">
    <div style="display:inline-flex;align-items:center;gap:10px;">
      <img alt="Logo" src="/logo-sm.png" style="height:36px;width:auto;" />
      <span style="font-weight:700;font-size:22px;letter-spacing:-0.3px;color:#0d1b2a;">WorkPing</span>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    const rootEl = document.querySelector('#root')
    new MutationObserver(() => {
      document.querySelector('#splash-screen')?.classList.add('remove');
    }).observe(rootEl, { childList: true });
  </script>
</body>

</html>
