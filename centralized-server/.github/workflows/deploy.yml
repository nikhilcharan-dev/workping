name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Audit ─────────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: server/.nvmrc
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Security audit
        run: npm audit --audit-level=high

  # ── 2. Deploy (only after audit passes) ─────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: audit

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKPING_SERVER_HOST }}
          username: ${{ secrets.WORKPING_SERVER_USER }}
          key: ${{ secrets.WORKPING_SERVER_SSH_KEY }}
          port: ${{ secrets.WORKPING_SERVER_PORT }}

          script: |
            set -e

            APP_DIR="/var/www/work-ping-server"

            echo "--- Pulling latest code ---"
            cd $APP_DIR
            git fetch origin main
            git merge --ff-only origin/main

            echo "--- Installing production dependencies ---"
            cd $APP_DIR/server
            npm ci --omit=dev

            echo "--- Reloading PM2 process ---"

            if sudo pm2 list | grep -q "server"; then
              sudo pm2 reload server --update-env
            else
              cd $APP_DIR
              sudo pm2 start server/server.js \
                --name server \
                --node-args="--experimental-vm-modules" \
                --env production \
                --max-memory-restart 512M \
                --restart-delay 3000
              sudo pm2 save
            fi

            echo "--- PM2 status ---"
            sudo pm2 status server
