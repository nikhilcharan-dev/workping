# WorkPing — Nginx Reverse Proxy / API Gateway
#
# Responsibilities:
#   • SSL/TLS termination
#   • Path-based routing to backend services
#   • Subdomain routing for PhonePe payments webhook
#   • Static file serving for compiled React dist/ builds
#   • WebSocket upgrade pass-through for Socket.io

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limit zones ──────────────────────────────────────────────────────
    # Sized to absorb legitimate bursts while killing brute-force / scraping
    # against the obvious targets. Keyed on $binary_remote_addr (the IP nginx
    # sees) — once trust-proxy is in place the gateway can swap to a header.
    # 10m of shared memory = ~160k unique source IPs tracked per zone.
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;
    limit_req_zone $binary_remote_addr zone=biometric:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=storage:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=chatbot_hook:10m rate=30r/s;
    limit_req_status 429;

    # ── Default security headers (applied at server-block level) ──────────────
    # Defined here so the same set rides every server stanza. `always` ensures
    # they apply even on error responses where add_header would otherwise be
    # silently dropped.
    map $sent_http_content_type $hsts_value {
        default "max-age=63072000; includeSubDomains; preload";
    }

    # ── Upstream blocks ────────────────────────────────────────────────────────
    # Each service runs on its own VM; DNS resolves to the private IP of that VM.
    upstream workping_api {
        server api.workping.live;
        keepalive 32;
    }

    upstream workping_biometric {
        server face.workping.live;
    }

    upstream workping_mailer {
        server mailer.workping.live;
    }

    upstream workping_payments {
        server payments.workping.live;
    }

    upstream workping_chatbot {
        server whatsapp.workping.live;
    }

    upstream workping_storage {
        server storage.workping.live;
    }

    # ── Redirect all HTTP to HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name workping.live www.workping.live phonepe.workping.live;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main application — workping.live ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name workping.live www.workping.live;

        ssl_certificate     /etc/nginx/ssl/workping.crt;
        ssl_certificate_key /etc/nginx/ssl/workping.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        # Cipher list orders ChaCha20 alongside AES-GCM for ARM/mobile clients
        # without AES-NI hardware. ssl_prefer_server_ciphers off keeps modern
        # browsers in charge of picking what their hardware accelerates.
        ssl_ciphers         ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────────────────
        # Applied via `always` so they ride error responses too. CSP is set to
        # match the SPA's actual needs — tighten further once inline scripts
        # are audited.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.workping.live wss://*.workping.live; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # ── Admin dashboard SPA ──────────────────────────────────────────────
        location /admin/ {
            alias /var/www/workping/admin-ui/dist/;
            try_files $uri $uri/ /admin/index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Employee portal SPA ──────────────────────────────────────────────
        location /portal/ {
            alias /var/www/workping/employees-ui/dist/;
            try_files $uri $uri/ /portal/index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Core API ─────────────────────────────────────────────────────────
        # Tighter limiter on the auth subtree — brute-force surface for login,
        # forgot-password, OTP, etc.
        location ~ ^/api/(auth|admin/auth|otp|admin/forgot-password)/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://workping_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/ {
            limit_req zone=api_general burst=40 nodelay;
            proxy_pass http://workping_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Socket.io (WebSocket upgrade pass-through) ───────────────────────
        location /socket.io/ {
            proxy_pass http://workping_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # ── Biometric service ────────────────────────────────────────────────
        location /biometric/ {
            limit_req zone=biometric burst=20 nodelay;
            proxy_pass http://workping_biometric/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Storage service ──────────────────────────────────────────────────
        location /storage/ {
            limit_req zone=storage burst=20 nodelay;
            proxy_pass http://workping_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 50m;
        }

        # ── Chatbot / WhatsApp webhook ───────────────────────────────────────
        location /chatbot/ {
            limit_req zone=chatbot_hook burst=60 nodelay;
            proxy_pass http://workping_chatbot/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Root → Admin SPA ─────────────────────────────────────────────────
        location / {
            root /var/www/workping/admin-ui/dist;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── PhonePe payments subdomain — phonepe.workping.live ────────────────────
    server {
        listen 443 ssl http2;
        server_name phonepe.workping.live;

        ssl_certificate     /etc/nginx/ssl/workping.crt;
        ssl_certificate_key /etc/nginx/ssl/workping.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_tickets off;

        # Same security headers as the main host — the audit flagged this
        # subdomain as missing them entirely.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            # PhonePe webhook is the noisy path. The general limit is generous
            # enough for legitimate traffic but kills request floods.
            limit_req zone=api_general burst=40 nodelay;
            proxy_pass http://workping_payments;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
