# WorkPing — Nginx Reverse Proxy / API Gateway
#
# Responsibilities:
#   • SSL/TLS termination
#   • Path-based routing to backend services
#   • Subdomain routing for PhonePe payments webhook
#   • Static file serving for compiled React dist/ builds
#   • WebSocket upgrade pass-through for Socket.io

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstream blocks ────────────────────────────────────────────────────────
    upstream workping_api {
        server workping-api:5000;
        keepalive 32;
    }

    upstream workping_biometric {
        server workping-biometric:5000;
    }

    upstream workping_mailer {
        server workping-mailer:3000;
    }

    upstream workping_payments {
        server workping-payments:3000;
    }

    upstream workping_chatbot {
        server workping-chatbot:3000;
    }

    upstream workping_storage {
        server workping-storage:8000;
    }

    # ── Redirect all HTTP to HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name workping.live www.workping.live phonepe.workping.live;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main application — workping.live ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name workping.live www.workping.live;

        ssl_certificate     /etc/nginx/ssl/workping.crt;
        ssl_certificate_key /etc/nginx/ssl/workping.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── Admin dashboard SPA ──────────────────────────────────────────────
        location /admin/ {
            alias /var/www/workping/admin-ui/dist/;
            try_files $uri $uri/ /admin/index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Employee portal SPA ──────────────────────────────────────────────
        location /portal/ {
            alias /var/www/workping/employees-ui/dist/;
            try_files $uri $uri/ /portal/index.html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Core API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://workping_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Socket.io (WebSocket upgrade pass-through) ───────────────────────
        location /socket.io/ {
            proxy_pass http://workping_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # ── Biometric service ────────────────────────────────────────────────
        location /biometric/ {
            proxy_pass http://workping_biometric/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Storage service ──────────────────────────────────────────────────
        location /storage/ {
            proxy_pass http://workping_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 50m;
        }

        # ── Chatbot / WhatsApp webhook ───────────────────────────────────────
        location /chatbot/ {
            proxy_pass http://workping_chatbot/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Root → Admin SPA ─────────────────────────────────────────────────
        location / {
            root /var/www/workping/admin-ui/dist;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── PhonePe payments subdomain — phonepe.workping.live ────────────────────
    server {
        listen 443 ssl http2;
        server_name phonepe.workping.live;

        ssl_certificate     /etc/nginx/ssl/workping.crt;
        ssl_certificate_key /etc/nginx/ssl/workping.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;

        location / {
            proxy_pass http://workping_payments;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
