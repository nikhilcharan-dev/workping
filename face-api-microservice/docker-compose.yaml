version: "3.8"

services:
  face-recognition-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: workping/face-recognition-api:latest
    container_name: face-recognition-api
    ports:
      - "0.0.0.0:3000:5000"
    environment:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: "${MONGODB_URI}"
      MONGODB_DB: "${MONGODB_DB}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      # Number of parallel inference workers — defaults to all CPU cores.
      # Tune down if GPU memory pressure is observed.
      INFERENCE_WORKERS: "${INFERENCE_WORKERS:-0}"
    volumes:
      - ./models:/app/models
      - ./image_dump:/app/image_dump
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
