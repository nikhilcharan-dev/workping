# WorkPing — Full Stack Docker Compose
#
# USAGE
#   Development (all services + Redis):
#     docker compose up -d
#
#   Single service:
#     docker compose up -d workping-api
#
#   Rebuild after code change:
#     docker compose up -d --build workping-biometric
#
# PREREQUISITES
#   1. Copy .env.example → .env in each service directory and fill in values.
#   2. MongoDB Atlas is external — ensure MONGODB_URI is set in the API .env.
#   3. OCI credentials (.oci/config + .pem) must be present for workping-storage.
#
# NOTE: The React frontends (admin-ui, employees-ui) are SPA builds deployed to
#       a CDN or served by Nginx. They are not included here — build with
#       `npm run build` and serve the dist/ folder.

version: "3.9"

# ─── Shared network ─────────────────────────────────────────────────────────
networks:
  workping:
    driver: bridge

# ─── Shared volumes ─────────────────────────────────────────────────────────
volumes:
  redis_data:
  biometric_models:
  nginx_ssl:

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── Nginx (reverse proxy / API gateway) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: workping-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certificates — place workping.crt and workping.key here
      - nginx_ssl:/etc/nginx/ssl:ro
      # Mount compiled SPA builds for static serving
      - ./admin-ui/dist:/var/www/workping/admin-ui/dist:ro
      - ./employees-ui/dist:/var/www/workping/employees-ui/dist:ro
    depends_on:
      workping-api:
        condition: service_healthy
      workping-biometric:
        condition: service_healthy
      workping-mailer:
        condition: service_healthy
      workping-payments:
        condition: service_healthy
      workping-chatbot:
        condition: service_healthy
      workping-storage:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ── Redis (shared by all backend services) ──────────────────────────────
  # Only reachable on the `workping` Docker network — no host port published.
  # Previously this listened on 0.0.0.0:6379 and accepted an empty password
  # whenever REDIS_PASSWORD was unset, which combined to an internet-reachable
  # unauthenticated Redis. ${REDIS_PASSWORD:?...} makes compose fail loudly
  # at boot if the env var is missing instead of silently launching open.
  redis:
    image: redis:7-alpine
    container_name: workping-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    # No `ports:` entry — service-to-service traffic uses the internal Docker
    # DNS name `redis` on the workping network. For one-off local debugging,
    # use `docker compose exec redis redis-cli` or temporarily uncomment a
    # 127.0.0.1-only binding: ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redis_data:/data
    networks:
      - workping
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.50"

  # ── Core API (workping-api) ──────────────────────────────────────────────
  # Reachable only via nginx (which terminates TLS and proxies internally).
  # Previously port 5000 was published to host 0.0.0.0 which bypassed every
  # nginx rate-limit / header / TLS guard. The `expose` directive documents
  # the port without binding it to the host.
  workping-api:
    build:
      context: ./centralized-server/server
      dockerfile: Dockerfile
    container_name: workping-api
    restart: unless-stopped
    env_file: ./centralized-server/server/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "5000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.00"

  # ── Biometric Service (workping-biometric) ───────────────────────────────
  workping-biometric:
    build:
      context: ./face-api-microservice
      dockerfile: Dockerfile
    container_name: workping-biometric
    restart: unless-stopped
    env_file: ./face-api-microservice/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "5000"
    volumes:
      # Mount models directory so they survive container rebuilds
      - biometric_models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "3.00"
        # Uncomment to enable GPU passthrough (requires nvidia-container-toolkit)
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: 1
        #       capabilities: [gpu]

  # ── Mailer Service (workping-mailer) ────────────────────────────────────
  workping-mailer:
    build:
      context: ./mailer-microservice
      dockerfile: Dockerfile
    container_name: workping-mailer
    restart: unless-stopped
    env_file: ./mailer-microservice/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  # ── Payments Service (workping-payments) ────────────────────────────────
  workping-payments:
    build:
      context: ./phonepe-gateway-microservice
      dockerfile: Dockerfile
    container_name: workping-payments
    restart: unless-stopped
    env_file: ./phonepe-gateway-microservice/.env
    expose:
      - "3000"
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  # ── Chatbot Service (workping-chatbot) ──────────────────────────────────
  workping-chatbot:
    build:
      context: ./whatsapp-microservice
      dockerfile: Dockerfile
    container_name: workping-chatbot
    restart: unless-stopped
    env_file: ./whatsapp-microservice/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"

  # ── Storage Service (workping-storage) ──────────────────────────────────
  workping-storage:
    build:
      context: ./oracle-cloud-object-microservice
      dockerfile: Dockerfile
    container_name: workping-storage
    restart: unless-stopped
    env_file: ./oracle-cloud-object-microservice/.env
    expose:
      - "8000"
    # OCI credentials are mounted read-only to a non-root user's home directory
    # (the storage container's Dockerfile creates a `node`/`nodeuser`). Mounting
    # to /root/.oci required the container to run as root — and exposed every
    # OCI tenancy key to anyone with code-execution inside the container.
    # The mount path must match the container user's actual $HOME.
    volumes:
      - ${HOME}/.oci:/home/node/.oci:ro
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
