# WorkPing — Full Stack Docker Compose
#
# USAGE
#   Development (all services + Redis):
#     docker compose up -d
#
#   Single service:
#     docker compose up -d workping-api
#
#   Rebuild after code change:
#     docker compose up -d --build workping-biometric
#
# PREREQUISITES
#   1. Copy .env.example → .env in each service directory and fill in values.
#   2. MongoDB Atlas is external — ensure MONGODB_URI is set in the API .env.
#   3. OCI credentials (.oci/config + .pem) must be present for workping-storage.
#
# NOTE: The React frontends (admin-ui, employees-ui) are SPA builds deployed to
#       a CDN or served by Nginx. They are not included here — build with
#       `npm run build` and serve the dist/ folder.

version: "3.9"

# ─── Shared network ─────────────────────────────────────────────────────────
networks:
  workping:
    driver: bridge

# ─── Shared volumes ─────────────────────────────────────────────────────────
volumes:
  redis_data:
  biometric_models:
  nginx_ssl:

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── Nginx (reverse proxy / API gateway) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: workping-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certificates — place workping.crt and workping.key here
      - nginx_ssl:/etc/nginx/ssl:ro
      # Mount compiled SPA builds for static serving
      - ./admin-ui/dist:/var/www/workping/admin-ui/dist:ro
      - ./employees-ui/dist:/var/www/workping/employees-ui/dist:ro
    depends_on:
      workping-api:
        condition: service_healthy
      workping-biometric:
        condition: service_healthy
      workping-mailer:
        condition: service_healthy
      workping-payments:
        condition: service_healthy
      workping-chatbot:
        condition: service_healthy
      workping-storage:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis (shared by all backend services) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: workping-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - workping
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core API (workping-api) ──────────────────────────────────────────────
  workping-api:
    build:
      context: ./centralized-server/server
      dockerfile: Dockerfile
    container_name: workping-api
    restart: unless-stopped
    env_file: ./centralized-server/server/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Biometric Service (workping-biometric) ───────────────────────────────
  workping-biometric:
    build:
      context: ./face-api-microservice
      dockerfile: Dockerfile
    container_name: workping-biometric
    restart: unless-stopped
    env_file: ./face-api-microservice/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8001:5000"
    volumes:
      # Mount models directory so they survive container rebuilds
      - biometric_models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Uncomment to enable GPU passthrough (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Mailer Service (workping-mailer) ────────────────────────────────────
  workping-mailer:
    build:
      context: ./mailer-microservice
      dockerfile: Dockerfile
    container_name: workping-mailer
    restart: unless-stopped
    env_file: ./mailer-microservice/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3003:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Payments Service (workping-payments) ────────────────────────────────
  workping-payments:
    build:
      context: ./phonepe-gateway-microservice
      dockerfile: Dockerfile
    container_name: workping-payments
    restart: unless-stopped
    env_file: ./phonepe-gateway-microservice/.env
    ports:
      - "3001:3000"
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Chatbot Service (workping-chatbot) ──────────────────────────────────
  workping-chatbot:
    build:
      context: ./whatsapp-microservice
      dockerfile: Dockerfile
    container_name: workping-chatbot
    restart: unless-stopped
    env_file: ./whatsapp-microservice/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3002:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Storage Service (workping-storage) ──────────────────────────────────
  workping-storage:
    build:
      context: ./oracle-cloud-object-microservice
      dockerfile: Dockerfile
    container_name: workping-storage
    restart: unless-stopped
    env_file: ./oracle-cloud-object-microservice/.env
    ports:
      - "8000:8000"
    # OCI SDK needs the credentials directory from the host
    volumes:
      - ${HOME}/.oci:/root/.oci:ro
    networks:
      - workping
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
