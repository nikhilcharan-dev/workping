name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so TruffleHog can diff commits

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # On PRs scan only the new commits; on push scan the full branch
          extra_args: >-
            --only-verified
            --fail
