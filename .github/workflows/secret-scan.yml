name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Read-only by default. Secret scanning needs nothing more.
permissions:
  contents: read

# Cancel duplicate runs on the same ref.
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so TruffleHog can diff commits

      - name: Run TruffleHog
        # NOTE: pin third-party actions by SHA before next release. `@main` is
        # mutable and a compromised upstream tag swap would run inside the
        # CI runner with whatever permissions this workflow grants.
        # Example: trufflesecurity/trufflehog@<full-sha-here>
        uses: trufflesecurity/trufflehog@main
        with:
          # --only-verified misses high-entropy unverified strings. We keep it
          # to reduce false-positive noise but pair it with --fail so any
          # verified hit blocks the merge.
          extra_args: >-
            --only-verified
            --fail
