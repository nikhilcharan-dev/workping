name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - centralized-server/server
          - admin-ui
          - employees-ui
          - mailer-microservice
          - phonepe-gateway-microservice
          - whatsapp-microservice
          - oracle-cloud-object-microservice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Lint
        run: npm run lint --if-present
        working-directory: ${{ matrix.service }}

      - name: Format check
        run: npm run format:check --if-present
        working-directory: ${{ matrix.service }}

  # ─── Test (Node services) ─────────────────────────────────────────────────
  test:
    name: Test (Node)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: centralized-server/server
            needs_redis: true
            needs_coverage: true
          - service: phonepe-gateway-microservice
            needs_redis: false
            needs_coverage: false
          - service: mailer-microservice
            needs_redis: false
            needs_coverage: false
          - service: whatsapp-microservice
            needs_redis: false
            needs_coverage: false
          - service: oracle-cloud-object-microservice
            needs_redis: false
            needs_coverage: false

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) so newly-added devDeps (jest,
        # cross-env) for the mailer/whatsapp/storage services are picked up
        # even before their lockfiles are regenerated locally. Subsequent
        # commits can switch back to `npm ci` once lockfiles are refreshed.
        run: npm install --no-audit --no-fund
        working-directory: ${{ matrix.service }}

      - name: Run tests (with coverage)
        if: matrix.needs_coverage == true
        run: npm test -- --coverage
        working-directory: ${{ matrix.service }}
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run tests
        if: matrix.needs_coverage != true
        run: npm test
        working-directory: ${{ matrix.service }}
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() && matrix.needs_coverage == true
        with:
          name: coverage-report-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
          retention-days: 7

  # ─── Test (Python — face service) ─────────────────────────────────────────
  test-python:
    name: Test (Python face service)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: face-api-microservice/requirements-dev.txt

      - name: Install test dependencies (no GPU model required)
        # We install pytest + minimal deps only. conftest.py stubs out
        # insightface/faiss/redis/motor so the heavy stack is never imported.
        working-directory: face-api-microservice
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio httpx fastapi numpy opencv-python-headless pydantic

      - name: Run pytest
        working-directory: face-api-microservice
        run: pytest

  # ─── Security audit ───────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - centralized-server/server
          - admin-ui
          - employees-ui
          - mailer-microservice
          - phonepe-gateway-microservice
          - whatsapp-microservice
          - oracle-cloud-object-microservice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.service }}

  # ─── Build Docker images ──────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, test-python]
    strategy:
      matrix:
        include:
          - service: centralized-server/server
            image: workping-api
          - service: mailer-microservice
            image: workping-mailer
          - service: phonepe-gateway-microservice
            image: workping-payments
          - service: whatsapp-microservice
            image: workping-chatbot
          - service: oracle-cloud-object-microservice
            image: workping-storage

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
