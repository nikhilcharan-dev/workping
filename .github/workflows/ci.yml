name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - centralized-server/server
          - admin-ui
          - employees-ui
          - mailer-microservice
          - phonepe-gateway-microservice
          - whatsapp-microservice
          - oracle-cloud-object-microservice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Lint
        run: npm run lint --if-present
        working-directory: ${{ matrix.service }}

      - name: Format check
        run: npm run format:check --if-present
        working-directory: ${{ matrix.service }}

  # ─── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: centralized-server/server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: centralized-server/server

      - name: Run tests with coverage
        run: npm test -- --coverage
        working-directory: centralized-server/server
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: centralized-server/server/coverage/
          retention-days: 7

  # ─── Security audit ───────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - centralized-server/server
          - admin-ui
          - employees-ui
          - mailer-microservice
          - phonepe-gateway-microservice
          - whatsapp-microservice
          - oracle-cloud-object-microservice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.service }}

  # ─── Build Docker images ──────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - service: centralized-server/server
            image: workping-api
          - service: mailer-microservice
            image: workping-mailer
          - service: phonepe-gateway-microservice
            image: workping-payments
          - service: whatsapp-microservice
            image: workping-chatbot
          - service: oracle-cloud-object-microservice
            image: workping-storage

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
