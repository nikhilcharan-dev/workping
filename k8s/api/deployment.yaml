apiVersion: apps/v1
kind: Deployment
metadata:
  name: workping-api
  namespace: workping
  labels:
    app: workping-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: workping-api
  template:
    metadata:
      labels:
        app: workping-api
        tier: backend
    spec:
      # Pod-level securityContext applies to all containers and any volumes
      # the kubelet creates. runAsNonRoot is a hard guard — if the image's
      # default user is uid 0, the pod fails to schedule rather than launching
      # with root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workping-api
          # Replace :latest with an immutable reference before deploying. The
          # CI/CD pipeline should write the digest here (image: workping/api@sha256:...)
          # so rollouts are reproducible and a re-pushed tag cannot silently swap
          # binaries. Tag form is kept here only as a placeholder.
          image: workping/api:v1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: redis-url
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: internal-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workping-api-hpa
  namespace: workping
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workping-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
