apiVersion: apps/v1
kind: Deployment
metadata:
  name: workping-chatbot
  namespace: workping
  labels:
    app: workping-chatbot
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workping-chatbot
  template:
    metadata:
      labels:
        app: workping-chatbot
        tier: backend
    spec:
      containers:
        - name: workping-chatbot
          image: workping/whatsapp:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3002"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: redis-url
            - name: META_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: meta-access-token
            - name: META_PHONE_NUMBER_ID
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: meta-phone-number-id
            - name: WHATSAPP_VERIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workping-secrets
                  key: whatsapp-verify-token
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: workping-chatbot
  namespace: workping
  labels:
    app: workping-chatbot
spec:
  selector:
    app: workping-chatbot
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
  type: ClusterIP
